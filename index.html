<title>Cat & Cow Festival 2026 — Programm</title>
<style>
  :root {
    --cream: #FFFFFF;
    --ink: #2B2620;
    --rose: #D6365B;
    --rose-deep: #B82548;
    --olive: #6F7D45;
    --olive-deep: #57622F;
    --line: rgba(43,38,32,0.12);

    --cat-yoga: #BFE2A8;        --cat-yoga-deep: #5C8A3E;
    --cat-meditation: #C9C3EC;  --cat-meditation-deep: #6B5FAE;
    --cat-workshop: #A9DDEA;    --cat-workshop-deep: #2E7E93;
    --cat-musik: #F3E48A;       --cat-musik-deep: #9C8A1E;
    --cat-kreis: #EFA197;       --cat-kreis-deep: #B8412F;
    --cat-kids: #F3C281;        --cat-kids-deep: #B06A1F;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .mono { font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace; }
  .serif { font-family: Georgia, "Times New Roman", serif; }

  /* ---------- Header (compact) ---------- */
  .hero {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 14px;
    background: #FCEFD8;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .hero h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700;
    font-style: italic;
    font-size: 19px;
    margin: 0;
    color: var(--ink);
    line-height: 1;
  }
  .hero .eyebrow {
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--rose-deep);
    white-space: nowrap;
  }
  .hero .sub, .hero .offline-note { display: none; }

  /* ---------- Day tabs ---------- */
  .day-nav {
    flex-shrink: 0;
    background: rgba(255,255,255,0.95);
    border-bottom: 1px solid var(--line);
    padding: 7px 14px;
  }
  .day-nav-inner {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-nav-inner::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 0 0 auto;
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 11px;
    padding: 6px 13px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .day-tab .d { display: block; font-weight: 700; font-size: 12px; }
  .day-tab .date { display: block; opacity: 0.55; font-size: 8.5px; margin-top: 1px; }
  .day-tab.active {
    background: var(--rose);
    border-color: var(--rose);
    color: white;
  }
  .day-tab.active .date { opacity: 0.85; }

  /* ---------- Controls / legend ---------- */
  .controls {
    flex-shrink: 0;
    padding: 7px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--line);
  }
  .legend {
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 10.5px;
    color: #6b6155;
    display: flex;
    align-items: center;
    gap: 13px;
    flex-wrap: wrap;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 5px; }
  .legend .dot {
    width: 10px; height: 10px; border-radius: 3px; display: inline-block;
    border: 1px solid rgba(43,38,32,0.15);
  }
  .legend .dot.cat-yoga { background: var(--cat-yoga); }
  .legend .dot.cat-meditation { background: var(--cat-meditation); }
  .legend .dot.cat-workshop { background: var(--cat-workshop); }
  .legend .dot.cat-musik { background: var(--cat-musik); }
  .legend .dot.cat-kreis { background: var(--cat-kreis); }
  .legend .dot.cat-kids { background: var(--cat-kids); }

  #search {
    font-size: 13px;
    padding: 6px 13px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: white;
    color: var(--ink);
    min-width: 180px;
    outline: none;
    font-family: inherit;
  }
  #search:focus { border-color: var(--rose); }
  #search::placeholder { color: #b3a896; }

  /* ---------- Special banner ---------- */
  .special-banner { padding: 8px 14px 0; flex-shrink: 0; }
  .special-banner .strip {
    background: var(--olive);
    color: var(--cream);
    border-radius: 9px;
    padding: 8px 14px;
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 11px;
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }
  .special-banner .strip b { font-family: inherit; font-weight: 700; }

  /* ---------- Grid ---------- */
  #panels {
    flex: 1 1 auto;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .day-panel { display: none; flex: 1 1 auto; overflow: hidden; flex-direction: column; }
  .day-panel.active { display: flex; }

  .grid-wrap {
    flex: 1 1 auto;
    padding: 10px 14px 14px;
    overflow: auto;
    scroll-snap-type: x proximate;
    position: relative;
  }
  .grid > .col { scroll-snap-align: start; }
  .day-panel { position: relative; }
  .day-panel::after {
    content: "";
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 28px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9));
    pointer-events: none;
  }
  .grid {
    display: grid;
    gap: 8px;
    grid-auto-flow: column;
    grid-auto-columns: 150px;
    align-items: start;
    height: 100%;
  }
  .col-head {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.01em;
    padding: 7px 11px;
    border-radius: 8px 8px 0 0;
    color: white;
    background: #8a7f70;
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
  }

  .card {
    border: 1px solid var(--line);
    border-left: 5px solid transparent;
    border-radius: 8px;
    padding: 10px 12px;
    text-decoration: none;
    color: var(--ink);
    display: block;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    cursor: default;
    position: relative;
  }
  .card.cat-yoga       { background: #EAF6E2; border-left-color: var(--cat-yoga-deep); }
  .card.cat-meditation { background: #EFEDF9; border-left-color: var(--cat-meditation-deep); }
  .card.cat-workshop   { background: #E6F6FA; border-left-color: var(--cat-workshop-deep); }
  .card.cat-musik      { background: #FBF7DE; border-left-color: var(--cat-musik-deep); }
  .card.cat-kreis      { background: #FBE9E6; border-left-color: var(--cat-kreis-deep); }
  .card.cat-kids       { background: #FCEEDA; border-left-color: var(--cat-kids-deep); }

  .card.linked { cursor: pointer; }
  .card.linked:active,
  .card.linked:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 14px rgba(43,38,32,0.16);
  }
  .card.linked::after {
    content: "→";
    position: absolute;
    top: 9px;
    right: 10px;
    font-size: 12px;
    color: var(--ink);
    opacity: 0.35;
  }
  .card .time {
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 10.5px;
    color: var(--ink);
    opacity: 0.65;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card .title {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.28;
    margin-bottom: 2px;
  }
  .card .people {
    font-size: 11.5px;
    color: #5c5448;
    font-style: italic;
  }
  .card.dim { opacity: 0.28; }

  @media (max-width: 640px) {
    .hero h1 { font-size: 16px; }
    .hero .eyebrow { font-size: 9px; }
    .grid { grid-auto-columns: 132px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .day-tab { transition: none; }
  }

  :focus-visible { outline: 2px solid var(--rose); outline-offset: 2px; }
</style>
</head>

<script>
(function() {
  const dayNav = document.getElementById('dayNav');
  const panels = document.getElementById('panels');
  const search = document.getElementById('search');

  const locOrder = ["Kuhstall","Cathouse","Om Tempel","Saustall","Strand","Freundeskreis","Kräuterweide","Feuerjurte","AcroYoga","SUP Yoga","Kidsspace"];

  function slug(s) { return s.replace(/\s+/g, ''); }

  function timeToMinutes(t) {
    const m = t.match(/(\d{1,2})[.:](\d{2})/);
    if (!m) return 9999;
    return parseInt(m[1]) * 60 + parseInt(m[2]);
  }

  FESTIVAL_DATA.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="d">${day.day}</span><span class="date">${day.date}</span>`;
    btn.addEventListener('click', () => selectDay(i));
    dayNav.appendChild(btn);
  });

  FESTIVAL_DATA.forEach((day, i) => {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (i === 0 ? ' active' : '');
    panel.dataset.idx = i;

    let specialHtml = '';
    if (day.special && day.special.length) {
      specialHtml = `<div class="special-banner">` + day.special.map(s =>
        `<div class="strip"><b>${s.time}</b> ${s.label}</div>`
      ).join('') + `</div>`;
    }

    const byLoc = {};
    day.slots.forEach(s => {
      if (!byLoc[s.location]) byLoc[s.location] = [];
      byLoc[s.location].push(s);
    });
    Object.keys(byLoc).forEach(loc => {
      byLoc[loc].sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));
    });

    const presentLocs = locOrder.filter(l => byLoc[l]);
    Object.keys(byLoc).forEach(l => { if (!presentLocs.includes(l)) presentLocs.push(l); });

    let gridHtml = '<div class="grid-wrap"><div class="grid">';
    presentLocs.forEach(loc => {
      gridHtml += `<div class="col loc-${slug(loc)}">`;
      gridHtml += `<div class="col-head">${loc}</div>`;
      byLoc[loc].forEach(s => {
        const linked = !!s.url;
        const tag = linked ? 'a' : 'div';
        const hrefAttr = linked ? `href="${s.url}" target="_blank" rel="noopener"` : '';
        const peopleHtml = s.people ? `<div class="people">${s.people}</div>` : '';
        const catClass = 'cat-' + (s.cat || 'workshop');
        gridHtml += `<${tag} class="card ${catClass}${linked ? ' linked' : ''}" ${hrefAttr} data-search="${(s.title + ' ' + s.people + ' ' + loc).toLowerCase()}">
          <div class="time">${s.time}</div>
          <div class="title">${s.title}</div>
          ${peopleHtml}
        </${tag}>`;
      });
      gridHtml += `</div>`;
    });
    gridHtml += '</div></div>';

    panel.innerHTML = specialHtml + gridHtml;
    panels.appendChild(panel);
  });

  function selectDay(idx) {
    document.querySelectorAll('.day-tab').forEach(b => b.classList.toggle('active', +b.dataset.idx === idx));
    document.querySelectorAll('.day-panel').forEach(p => p.classList.toggle('active', +p.dataset.idx === idx));
    search.value = '';
    filterCards('');
  }

  function filterCards(query) {
    const q = query.trim().toLowerCase();
    document.querySelectorAll('.card').forEach(card => {
      if (!q) { card.classList.remove('dim'); return; }
      const hay = card.dataset.search || '';
      card.classList.toggle('dim', !hay.includes(q));
    });
  }

  search.addEventListener('input', (e) => filterCards(e.target.value));
})();
</script>
