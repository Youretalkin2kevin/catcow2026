<style>
  :root {
    --bg: #1C1B1D;
    --bg-deep: #141314;
    --paper: #242325;
    --ink: #F2F1F0;
    --ink-dim: #8A8889;
    --rose: #FF4D6D;
    --rose-deep: #E0395A;
    --olive: #4FA68A;
    --olive-deep: #3D8870;
    --line: rgba(242,241,240,0.09);
    --card-bg: #242325;
    --card-border: #322F32;
    --card-accent: #FF4D6D;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .mono { font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace; }
  .serif { font-family: Georgia, "Times New Roman", serif; }

  /* ---------- Header (compact) ---------- */
  .hero {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 14px;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .hero h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700;
    font-style: italic;
    font-size: 19px;
    margin: 0;
    color: var(--ink);
    line-height: 1;
  }
  .hero .eyebrow {
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--rose);
    white-space: nowrap;
  }
  .hero .sub, .hero .offline-note { display: none; }

  /* ---------- Day tabs + search (single row) ---------- */
  .day-nav {
    flex-shrink: 0;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--line);
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .day-nav-inner {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    flex: 1 1 auto;
    min-width: 0;
  }
  .day-nav-inner::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 0 0 auto;
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 9px 15px;
    min-width: 42px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    text-align: center;
  }
  .day-tab.active {
    background: var(--rose);
    border-color: var(--rose);
    color: white;
  }

  .fav-overview-trigger {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 9px 15px;
    border-radius: 999px;
    border: 1.5px solid #E0B23D;
    background: transparent;
    color: #E0B23D;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .fav-overview-trigger:hover {
    background: #E0B23D;
    color: #000000;
  }

  /* ---------- Special banner ---------- */
  .special-banner { padding: 8px 14px 0; flex-shrink: 0; }
  .special-banner .strip {
    background: var(--olive-deep);
    color: var(--ink);
    border-radius: 9px;
    padding: 8px 14px;
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 11px;
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }
  .special-banner .strip b { font-family: inherit; font-weight: 700; }

  /* ---------- Grid ---------- */
  #panels {
    flex: 1 1 auto;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .day-panel { display: none; flex: 1 1 auto; overflow: hidden; flex-direction: column; }
  .day-panel.active { display: flex; }

  .grid-wrap {
    flex: 1 1 auto;
    padding: 10px 14px 14px;
    overflow: auto;
    scroll-snap-type: x proximate;
    position: relative;
  }
  .grid > .col { scroll-snap-align: start; }
  .day-panel { position: relative; }
  .day-panel::after {
    content: "";
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 28px;
    background: linear-gradient(90deg, transparent, rgba(46,42,36,0.95));
    pointer-events: none;
  }
  .grid {
    display: grid;
    gap: 8px;
    grid-auto-flow: column;
    grid-auto-columns: 150px;
    align-items: start;
    height: 100%;
  }
  .col-head {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 7px 11px;
    border-radius: 6px 6px 0 0;
    color: var(--ink);
    background: var(--paper);
    border-bottom: 2px solid var(--rose);
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 10px 34px 10px 12px;
    text-decoration: none;
    color: var(--ink);
    display: block;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    cursor: default;
    position: relative;
  }

  .card.linked { cursor: pointer; }
  .card.linked:active,
  .card.linked:hover {
    transform: translateY(-1px);
    background: #2D2C2F;
    border-color: var(--rose);
    box-shadow: 0 5px 14px rgba(0,0,0,0.4);
  }
  .card.linked .go-arrow {
    position: absolute;
    bottom: 9px;
    right: 9px;
    font-size: 14px;
    font-weight: 900;
    color: var(--rose);
    opacity: 0.9;
  }
  .card.linked:hover .go-arrow {
    opacity: 1;
  }
  .card.favorited {
    border-color: #E0B23D;
    background: #2A2620;
  }
  .fav-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 26px;
    height: 26px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    line-height: 26px;
    text-align: center;
    color: var(--ink-dim);
    opacity: 0.5;
    z-index: 2;
    transition: opacity 0.15s ease, color 0.15s ease, transform 0.1s ease;
  }
  .fav-btn:hover { opacity: 0.9; transform: scale(1.12); }
  .fav-btn.active { color: #E0B23D; opacity: 1; }
  .card .time {
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 10.5px;
    color: var(--rose);
    opacity: 0.9;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card .title {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.28;
    margin-bottom: 2px;
    padding-right: 4px;
    overflow-wrap: break-word;
    word-break: break-word;
    hyphens: auto;
  }
  .card .people {
    font-size: 11.5px;
    color: var(--ink-dim);
    font-style: italic;
  }

  /* ---------- Favorites overview modal ---------- */
  .fav-overview {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .fav-overview.open { display: flex; }
  .fav-overview-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-deep);
  }
  .fav-overview-header h2 {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 18px;
    margin: 0;
    color: var(--ink);
  }
  .fav-overview-actions { display: flex; gap: 8px; }
  .fav-overview-btn {
    font-family: inherit;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
  }
  .fav-overview-btn.primary {
    background: #E0B23D;
    border-color: #E0B23D;
    color: #000000;
    font-weight: 600;
  }
  .fav-overview-list {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 18px;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
  }
  .fav-day-group { margin-bottom: 22px; }
  .fav-day-group h3 {
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--rose);
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }
  .fav-row {
    display: flex;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    align-items: baseline;
  }
  .fav-row .fr-time {
    font-family: "SF Mono", "Cascadia Code", Consolas, Menlo, Monaco, monospace;
    font-size: 12px;
    color: var(--ink-dim);
    flex: 0 0 78px;
  }
  .fav-row .fr-main { flex: 1 1 auto; }
  .fav-row .fr-title { font-weight: 600; font-size: 14px; color: var(--ink); }
  .fav-row .fr-meta { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }
  .fav-empty {
    text-align: center;
    color: var(--ink-dim);
    padding: 60px 20px;
    font-size: 14px;
  }

  @media print {
    body * { visibility: hidden; }
    .fav-overview, .fav-overview * { visibility: visible; }
    .fav-overview {
      position: absolute;
      inset: 0;
      background: white !important;
      color: black !important;
      display: flex !important;
    }
    .fav-overview-header { display: none !important; }
    .fav-overview-list { max-width: 100%; padding: 0; }
    .fav-day-group h3 { color: #444 !important; border-color: #ccc !important; }
    .fav-row { border-color: #ddd !important; }
    .fav-row .fr-time { color: #555 !important; }
    .fav-row .fr-title { color: #000 !important; }
    .fav-row .fr-meta { color: #555 !important; }
  }

  @media (max-width: 640px) {
    .hero { padding: 10px 14px; }
    .hero h1 { font-size: 17px; }
    .hero .eyebrow { font-size: 9px; }
    .day-nav { padding: 8px 10px; gap: 8px; }
    .day-tab { font-size: 13px; padding: 9px 13px; min-width: 38px; }
    .fav-overview-trigger { padding: 9px 13px; font-size: 12.5px; }
    .grid { grid-auto-columns: 158px; gap: 7px; }
    .grid-wrap { padding: 8px 10px 10px; }
    .col-head { font-size: 12px; padding: 8px 10px; }
    .card { padding: 11px 32px 11px 11px; }
    .card .title { font-size: 13.5px; }
    .card .time { font-size: 11px; }
    .card .people { font-size: 11px; }
    .fav-btn { width: 30px; height: 30px; font-size: 17px; line-height: 30px; }
    .fav-overview-header { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
    .fav-overview-header h2 { font-size: 16px; }
    .fav-overview-btn { padding: 9px 14px; font-size: 13px; }
    .fav-row .fr-time { flex: 0 0 64px; font-size: 11px; }
    .fav-row .fr-title { font-size: 13.5px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .day-tab { transition: none; }
  }

  :focus-visible { outline: 2px solid var(--rose); outline-offset: 2px; }
</style>
</head>

<script>
(function() {
  const dayNav = document.getElementById('dayNav');
  const panels = document.getElementById('panels');
  const favorites = loadFavoritesEarly();

  const locOrder = ["Kuhstall","Cathouse","Om Tempel","Saustall","Strand","Freundeskreis","Kräuterweide","Feuerjurte","AcroYoga","SUP Yoga","Kidsspace"];

  function slug(s) { return s.replace(/\s+/g, ''); }

  function idSafe(s) {
    return s.replace(/[^a-zA-Z0-9äöüÄÖÜß]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  }

  function loadFavoritesEarly() {
    try {
      const raw = localStorage.getItem('catcow2026_favorites');
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch (e) {
      return new Set();
    }
  }

  function timeToMinutes(t) {
    const m = t.match(/(\d{1,2})[.:](\d{2})/);
    if (!m) return 9999;
    return parseInt(m[1]) * 60 + parseInt(m[2]);
  }

  const dayAbbrev = { "Mittwoch": "Mi", "Donnerstag": "Do", "Freitag": "Fr", "Samstag": "Sa", "Sonntag": "So" };

  FESTIVAL_DATA.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="d">${dayAbbrev[day.day] || day.day}</span>`;
    btn.addEventListener('click', () => selectDay(i));
    dayNav.appendChild(btn);
  });

  FESTIVAL_DATA.forEach((day, i) => {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (i === 0 ? ' active' : '');
    panel.dataset.idx = i;

    let specialHtml = '';
    if (day.special && day.special.length) {
      specialHtml = `<div class="special-banner">` + day.special.map(s =>
        `<div class="strip"><b>${s.time}</b> ${s.label}</div>`
      ).join('') + `</div>`;
    }

    const byLoc = {};
    day.slots.forEach(s => {
      if (!byLoc[s.location]) byLoc[s.location] = [];
      byLoc[s.location].push(s);
    });
    Object.keys(byLoc).forEach(loc => {
      byLoc[loc].sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));
    });

    const presentLocs = locOrder.filter(l => byLoc[l]);
    Object.keys(byLoc).forEach(l => { if (!presentLocs.includes(l)) presentLocs.push(l); });

    let gridHtml = '<div class="grid-wrap"><div class="grid">';
    presentLocs.forEach(loc => {
      gridHtml += `<div class="col loc-${slug(loc)}">`;
      gridHtml += `<div class="col-head">${loc}</div>`;
      byLoc[loc].forEach(s => {
        const linked = !!s.url;
        const tag = linked ? 'a' : 'div';
        const hrefAttr = linked ? `href="${s.url}" target="_blank" rel="noopener"` : '';
        const peopleHtml = s.people ? `<div class="people">${s.people}</div>` : '';
        const eventId = idSafe(day.day + '_' + loc + '_' + s.time + '_' + s.title.slice(0, 30));
        const isFav = favorites.has(eventId);
        const arrowHtml = linked ? '<span class="go-arrow">→</span>' : '';
        gridHtml += `<${tag} class="card${linked ? ' linked' : ''}${isFav ? ' favorited' : ''}" ${hrefAttr} data-event-id="${eventId}">
          <button class="fav-btn${isFav ? ' active' : ''}" data-event-id="${eventId}" aria-label="Favorit" onclick="event.preventDefault(); event.stopPropagation(); toggleFavorite('${eventId}', this);">${isFav ? '★' : '☆'}</button>
          <div class="time">${s.time}</div>
          <div class="title">${s.title}</div>
          ${peopleHtml}
          ${arrowHtml}
        </${tag}>`;
      });
      gridHtml += `</div>`;
    });
    gridHtml += '</div></div>';

    panel.innerHTML = specialHtml + gridHtml;
    panels.appendChild(panel);
  });

  function selectDay(idx) {
    document.querySelectorAll('.day-tab').forEach(b => b.classList.toggle('active', +b.dataset.idx === idx));
    document.querySelectorAll('.day-panel').forEach(p => p.classList.toggle('active', +p.dataset.idx === idx));
  }

  // ---------- Favorites (LocalStorage) ----------
  window.toggleFavorite = function(eventId, btnEl) {
    if (favorites.has(eventId)) {
      favorites.delete(eventId);
    } else {
      favorites.add(eventId);
    }
    saveFavorites();
    document.querySelectorAll(`[data-event-id="${eventId}"]`).forEach(el => {
      if (el.classList.contains('fav-btn')) {
        el.classList.toggle('active', favorites.has(eventId));
        el.textContent = favorites.has(eventId) ? '★' : '☆';
      }
      if (el.classList.contains('card')) {
        el.classList.toggle('favorited', favorites.has(eventId));
      }
    });
  };

  function saveFavorites() {
    try {
      localStorage.setItem('catcow2026_favorites', JSON.stringify([...favorites]));
    } catch (e) { /* localStorage unavailable, ignore */ }
  }

  // ---------- Favorites overview (cross-day, printable) ----------
  const favOverview = document.getElementById('favOverview');
  const favOverviewList = document.getElementById('favOverviewList');
  const favOverviewBtn = document.getElementById('favOverviewBtn');
  const closeFavBtn = document.getElementById('closeFavBtn');
  const printFavBtn = document.getElementById('printFavBtn');

  function collectFavoritedEvents() {
    const result = [];
    FESTIVAL_DATA.forEach(day => {
      day.slots.forEach(s => {
        const eventId = idSafe(day.day + '_' + s.location + '_' + s.time + '_' + s.title.slice(0, 30));
        if (favorites.has(eventId)) {
          result.push({
            day: day.day,
            date: day.date,
            dayIndex: FESTIVAL_DATA.indexOf(day),
            time: s.time,
            minutes: timeToMinutes(s.time),
            location: s.location,
            title: s.title,
            people: s.people
          });
        }
      });
    });
    result.sort((a, b) => a.dayIndex - b.dayIndex || a.minutes - b.minutes);
    return result;
  }

  function renderFavOverview() {
    const events = collectFavoritedEvents();
    if (events.length === 0) {
      favOverviewList.innerHTML = '<div class="fav-empty">Noch keine Favoriten markiert.<br>Tippe auf den ☆ in einer Karte, um sie hier zu sammeln.</div>';
      return;
    }
    let html = '';
    let currentDay = null;
    events.forEach(e => {
      if (e.day !== currentDay) {
        if (currentDay !== null) html += '</div>';
        html += `<div class="fav-day-group"><h3>${e.day}, ${e.date}</h3>`;
        currentDay = e.day;
      }
      const metaParts = [e.location];
      if (e.people) metaParts.push(e.people);
      html += `<div class="fav-row">
        <div class="fr-time">${e.time}</div>
        <div class="fr-main">
          <div class="fr-title">${e.title}</div>
          <div class="fr-meta">${metaParts.join(' · ')}</div>
        </div>
      </div>`;
    });
    html += '</div>';
    favOverviewList.innerHTML = html;
  }

  favOverviewBtn.addEventListener('click', () => {
    renderFavOverview();
    favOverview.classList.add('open');
  });
  closeFavBtn.addEventListener('click', () => {
    favOverview.classList.remove('open');
  });
  printFavBtn.addEventListener('click', () => {
    window.print();
  });
})();
</script>
